<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단풍의 전설 데미지 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            font-size: 0.875rem;
        }
        select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            background-color: white;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            color: #374151;
        }
        .form-group {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">단풍의 전설 데미지 계산기</h1>

        <!-- Equipment Selection UI -->
        <div class="bg-white p-6 rounded-lg shadow-md mb-6 border-2 border-indigo-400">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-bold text-indigo-600">장비 설정</h2>
                <div class="flex items-center">
                    <input type="checkbox" id="equipConditional" class="calc-input mr-2 w-4 h-4 text-indigo-600">
                    <label for="equipConditional" class="font-bold text-gray-700 m-0 cursor-pointer">장비 조건부 옵션 적용</label>
                    <button onclick="unequipAll()" class="text-sm bg-red-500 hover:bg-red-600 text-white font-bold py-1 px-3 rounded-lg transition duration-200 ml-4">장비 모두 해제</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 1분류: 장비 -->
                <div>
                    <h3 class="font-bold text-gray-600 mb-2">1분류 (장비)</h3>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>무기</label><select id="equipWeapon" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="equipWeaponLevel" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="equipWeaponMult" class="calc-input" value="0"></div></div>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>방어구</label><select id="equipArmor" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="equipArmorLevel" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="equipArmorMult" class="calc-input" value="0"></div></div>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>귀걸이</label><select id="equipEarring" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="equipEarringLevel" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="equipEarringMult" class="calc-input" value="0"></div></div>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>펜던트</label><select id="equipPendant" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="equipPendantLevel" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="equipPendantMult" class="calc-input" value="0"></div></div>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>반지 1</label><select id="equipRing1" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="equipRing1Level" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="equipRing1Mult" class="calc-input" value="0"></div></div>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>반지 2</label><select id="equipRing2" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="equipRing2Level" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="equipRing2Mult" class="calc-input" value="0"></div></div>
                </div>
                <!-- 2분류: 펫 -->
                <div>
                    <h3 class="font-bold text-gray-600 mb-2">2분류 (펫)</h3>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>펫 1</label><select id="equipPet1" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="equipPet1Level" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="equipPet1Mult" class="calc-input" value="0"></div></div>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>펫 2</label><select id="equipPet2" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="equipPet2Level" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="equipPet2Mult" class="calc-input" value="0"></div></div>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>펫 3</label><select id="equipPet3" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="equipPet3Level" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="equipPet3Mult" class="calc-input" value="0"></div></div>
                </div>
                <!-- 3분류: 치장 -->
                <div>
                    <h3 class="font-bold text-gray-600 mb-2">3분류 (치장)</h3>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>치장 무기</label><select id="cosWeapon" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="cosWeaponLevel" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="cosWeaponMult" class="calc-input" value="0"></div></div>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>치장 반지</label><select id="cosRing" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="cosRingLevel" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="cosRingMult" class="calc-input" value="0"></div></div>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>치장 모자</label><select id="cosHat" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="cosHatLevel" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="cosHatMult" class="calc-input" value="0"></div></div>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>치장 눈장식</label><select id="cosEye" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="cosEyeLevel" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="cosEyeMult" class="calc-input" value="0"></div></div>
                    <div class="flex gap-2 mb-2"><div class="form-group flex-grow m-0"><label>치장 포켓</label><select id="cosPocket" class="calc-input equip-select"></select></div><div class="form-group w-16 m-0"><label>Lv</label><input type="number" id="cosPocketLevel" class="calc-input" value="0"></div><div class="form-group w-24 m-0"><label>상승치%</label><input type="number" id="cosPocketMult" class="calc-input" value="0"></div></div>
                </div>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Left Column: Stats 1 -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-bold mb-4 text-blue-600 border-b pb-2">기본 능력치</h2>
                <div class="form-group">
                    <label>능력치 최종 공격력</label>
                    <input type="number" id="finalAttack" class="calc-input" value="1000">
                </div>
                <div class="form-group">
                    <label>공격력 (%)</label>
                    <input type="number" id="attackPct" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>공격력(모험) (%)</label>
                    <input type="number" id="advAttackPct" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>크리티컬 확률 (%)</label>
                    <input type="number" id="critRate" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>크리티컬 데미지 (%)</label>
                    <input type="number" id="critDmg" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>공격속도 (0~12단계)</label>
                    <input type="number" id="atkSpeed" class="calc-input" value="0" min="0" max="12">
                </div>

                <h2 class="text-xl font-bold mt-6 mb-4 text-purple-600 border-b pb-2">몬스터 및 기타 데미지</h2>
                <div class="form-group">
                    <label>일반/스킬 공격 피해량 (%)</label>
                    <input type="number" id="attackDamagePct" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>적이 받는 피해량 증가 (%)</label>
                    <input type="number" id="dmgTakenInc" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>모든 데미지 (%)</label>
                    <input type="number" id="allDmg" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>일반 몬스터 데미지 (%)</label>
                    <input type="number" id="normalMonsterDmg" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>보스 몬스터 데미지 (%)</label>
                    <input type="number" id="bossMonsterDmg" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>범위 피해량 (%)</label>
                    <input type="number" id="aoeDmg" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>발사체 피해량 (%)</label>
                    <input type="number" id="projectileDmg" class="calc-input" value="0" step="0.1">
                </div>
            </div>

            <!-- Middle Column: Stats 2 -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-bold mb-4 text-green-600 border-b pb-2">직업별 데미지</h2>
                <div class="form-group">
                    <label>내 직업 선택</label>
                    <select id="myClass" class="calc-input">
                        <option value="전사">전사</option>
                        <option value="마법사">마법사</option>
                        <option value="궁수">궁수</option>
                        <option value="도적">도적</option>
                        <option value="해적">해적</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>전사 데미지 (%)</label>
                    <input type="number" id="warriorDmg" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>마법사 데미지 (%)</label>
                    <input type="number" id="mageDmg" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>궁수 데미지 (%)</label>
                    <input type="number" id="archerDmg" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>도적 데미지 (%)</label>
                    <input type="number" id="thiefDmg" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>해적 데미지 (%)</label>
                    <input type="number" id="pirateDmg" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>전직업 데미지 (%)</label>
                    <input type="number" id="allClassDmg" class="calc-input" value="0" step="0.1">
                </div>

                <h2 class="text-xl font-bold mt-6 mb-4 text-indigo-600 border-b pb-2">기본공격 / 스킬 능력치</h2>
                <div class="form-group">
                    <label>기본공격 데미지 (%)</label>
                    <input type="number" id="basicAttackDmg" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>기본공격 크리티컬 확률 (%)</label>
                    <input type="number" id="basicCritRate" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>기본공격 크리티컬 데미지 (%)</label>
                    <input type="number" id="basicCritDmg" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>스킬 데미지 (%)</label>
                    <input type="number" id="skillDmg" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>스킬 크리티컬 확률 (%)</label>
                    <input type="number" id="skillCritRate" class="calc-input" value="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>스킬 크리티컬 데미지 (%)</label>
                    <input type="number" id="skillCritDmg" class="calc-input" value="0" step="0.1">
                </div>
            </div>

            <!-- Right Column: Settings and Results -->
            <div class="flex flex-col gap-6">
                <!-- Attack Settings -->
                <div class="bg-white p-6 rounded-lg shadow-md border-2 border-yellow-400">
                    <h2 class="text-xl font-bold mb-4 text-yellow-600 border-b pb-2">현재 공격 설정</h2>
                    <div class="form-group">
                        <label>공격 종류</label>
                        <select id="attackType" class="calc-input bg-yellow-50">
                            <option value="기본공격">기본공격</option>
                            <option value="스킬">스킬</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>몬스터 종류</label>
                        <select id="monsterType" class="calc-input bg-yellow-50">
                            <option value="일반">일반 몬스터</option>
                            <option value="보스">보스 몬스터</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>공격 형태</label>
                        <select id="hitType" class="calc-input bg-yellow-50">
                            <option value="일반">일반</option>
                            <option value="범위">범위 피해</option>
                            <option value="발사체">발사체 피해</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>일반공격 또는 스킬 계수 (%)</label>
                        <input type="number" id="skillMultiplier" class="calc-input" value="100" step="1">
                    </div>

                    <h2 class="text-xl font-bold mt-6 mb-4 text-orange-600 border-b pb-2">DPS 측정 설정</h2>
                    <div class="form-group">
                        <label>1초당 타격 횟수(타수)</label>
                        <input type="number" id="hitsPerSec" class="calc-input" value="1" step="0.1" min="0">
                    </div>
                    <div class="form-group">
                        <label>딜 측정 시간(초)</label>
                        <input type="number" id="dpsTime" class="calc-input" value="10" step="1" min="1">
                    </div>
                </div>

                <!-- Results -->
                <div class="bg-gray-800 text-white p-6 rounded-lg shadow-md flex-grow">
                    <h2 class="text-2xl font-bold mb-6 text-center text-yellow-400">데미지 계산 결과</h2>
                    
                    <div class="space-y-4">
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2">
                            <span class="text-gray-300">원본 공격력</span>
                            <span id="resOriginalAttack" class="font-bold text-lg">0</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2">
                            <span class="text-gray-300">적용 크리티컬 확률</span>
                            <span id="resCritRate" class="font-bold text-lg text-blue-300">0%</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2 mt-4">
                            <span class="text-gray-300">노크리 일반공격</span>
                            <span id="resBasicNoCritDmg" class="font-bold text-xl text-orange-300">0</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2">
                            <span class="text-gray-300">크리 일반공격</span>
                            <span id="resBasicCritDmg" class="font-bold text-xl text-red-300">0</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2">
                            <span class="text-gray-300">노크리 스킬공격</span>
                            <span id="resSkillNoCritDmg" class="font-bold text-xl text-orange-400">0</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2">
                            <span class="text-gray-300">크리 스킬공격</span>
                            <span id="resSkillCritDmg" class="font-bold text-xl text-red-400">0</span>
                        </div>
                        <div class="flex justify-between items-center mt-2 bg-gray-700 p-2 rounded">
                            <span class="text-gray-200">평균 데미지 (기대값)</span>
                            <span id="resAvgDmg" class="font-bold text-xl text-yellow-300">0</span>
                        </div>
                        <div class="flex justify-between items-center mt-4 bg-gray-900 p-3 rounded-lg border border-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.3)]">
                            <span class="text-yellow-400 font-bold text-lg">평균 DPS</span>
                            <span id="resAvgDPS" class="font-bold text-2xl text-yellow-400">0</span>
                        </div>
                        <div class="flex justify-between items-center mt-2 bg-gray-900 p-3 rounded-lg border border-red-500 shadow-[0_0_10px_rgba(239,68,68,0.3)]">
                            <span class="text-red-400 font-bold text-lg">최종 총 데미지</span>
                            <span id="resTotalDmg" class="font-bold text-2xl text-red-400">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Preset Section -->
        <div class="mt-6 bg-white p-6 rounded-lg shadow-md border-2 border-green-400">
            <h2 class="text-xl font-bold mb-4 text-green-600 border-b pb-2">프리셋 및 순위표</h2>
            <div class="flex gap-4 mb-4">
                <select id="presetFilter" class="calc-input flex-grow border rounded p-2 text-gray-700 bg-gray-50 focus:ring-green-500 focus:border-green-500">
                    <option value="전체">전체보기</option>
                    <option value="기본공격">기본공격</option>
                    <option value="스킬">스킬</option>
                </select>
            </div>
            <div class="flex gap-4 mb-6">
                <input type="text" id="presetName" class="calc-input flex-grow" placeholder="프리셋 이름 (미입력시 프리셋 1, 2...)">
                <button onclick="savePreset()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-lg transition duration-200">
                    저장
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-500">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3">순위</th>
                            <th scope="col" class="px-6 py-3">프리셋 이름</th>
                            <th scope="col" class="px-6 py-3">평균 DPS</th>
                            <th scope="col" class="px-6 py-3">불러오기 / 삭제</th>
                        </tr>
                    </thead>
                    <tbody id="presetTableBody">
                        <!-- Presets will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Equipment Data
        const equipmentData = {
            equipWeapon: [
                { name: "없음", stats: {} },
                { name: "초보자의 검", stats: { attackPct: 2 } },
                { name: "전설의 검", stats: { attackPct: 15, bossMonsterDmg: 20 }, conditional: { critDmg: 10 } }
            ],
            equipArmor: [
                { name: "없음", stats: {} },
                { name: "가죽 갑옷", stats: { allDmg: 5 } },
                { name: "드래곤 갑옷", stats: { allDmg: 15, normalMonsterDmg: 10 } }
            ],
            equipEarring: [
                { name: "없음", stats: {} },
                { name: "은 귀걸이", stats: { critRate: 2 } },
                { name: "루비 귀걸이", stats: { critRate: 5, critDmg: 10 } }
            ],
            equipPendant: [
                { name: "없음", stats: {} },
                { name: "목걸이", stats: { attackDamagePct: 5 } },
                { name: "마력의 목걸이", stats: { attackDamagePct: 15, skillDmg: 10 } }
            ],
            equipRing1: [
                { name: "없음", stats: {} },
                { name: "구리 반지", stats: { allClassDmg: 2 } },
                { name: "절대 반지", stats: { allClassDmg: 10, allDmg: 10 } }
            ],
            equipRing2: [
                { name: "없음", stats: {} },
                { name: "구리 반지", stats: { allClassDmg: 2 } },
                { name: "절대 반지", stats: { allClassDmg: 10, allDmg: 10 } }
            ],
            equipPet1: [
                { name: "없음", stats: {} },
                { name: "달팽이", stats: { attackPct: 1 } },
                { name: "아기 드래곤", stats: { attackPct: 5, bossMonsterDmg: 15 } }
            ],
            equipPet2: [
                { name: "없음", stats: {} },
                { name: "달팽이", stats: { attackPct: 1 } },
                { name: "아기 드래곤", stats: { attackPct: 5, bossMonsterDmg: 15 } }
            ],
            equipPet3: [
                { name: "없음", stats: {} },
                { name: "달팽이", stats: { attackPct: 1 } },
                { name: "아기 드래곤", stats: { attackPct: 5, bossMonsterDmg: 15 } }
            ],
            cosWeapon: [
                { name: "없음", stats: {} },
                { name: "장난감 검", stats: { dmgTakenInc: 2 } }
            ],
            cosRing: [
                { name: "없음", stats: {} },
                { name: "우정 반지", stats: { aoeDmg: 5 } }
            ],
            cosHat: [
                { name: "없음", stats: {} },
                { name: "밀짚모자", stats: { projectileDmg: 5 } }
            ],
            cosEye: [
                { name: "없음", stats: {} },
                { name: "선글라스", stats: { basicAttackDmg: 5 } }
            ],
            cosPocket: [
                { name: "없음", stats: {} },
                { name: "부적", stats: { advAttackPct: 5 } }
            ]
        };

        function initEquipment() {
            for (const [id, items] of Object.entries(equipmentData)) {
                const select = document.getElementById(id);
                if(select) {
                    items.forEach((item, index) => {
                        const option = document.createElement('option');
                        option.value = index;
                        option.textContent = item.name;
                        select.appendChild(option);
                    });
                }
            }
        }

        // Initialize equipment dropdowns early
        initEquipment();

        // Unequip All Function
        function unequipAll() {
            document.querySelectorAll('.equip-select').forEach(el => el.value = '0');
            document.querySelectorAll('input[id$="Level"], input[id$="Mult"]').forEach(el => el.value = '0');
            calculate();
        }

        // Duplication Check Logic
        document.addEventListener('change', function(e) {
            if (e.target && e.target.classList.contains('equip-select')) {
                const id = e.target.id;
                const val = e.target.value;
                if (val !== '0') {
                    if (id === 'equipRing1' || id === 'equipRing2') {
                        const otherId = id === 'equipRing1' ? 'equipRing2' : 'equipRing1';
                        if (document.getElementById(otherId).value === val) {
                            alert("중복 착용할 수 없습니다.");
                            e.target.value = '0';
                            calculate();
                        }
                    } else if (id.startsWith('equipPet')) {
                        const pets = ['equipPet1', 'equipPet2', 'equipPet3'];
                        for (let petId of pets) {
                            if (petId !== id && document.getElementById(petId).value === val) {
                                alert("중복 착용할 수 없습니다.");
                                e.target.value = '0';
                                calculate();
                                break;
                            }
                        }
                    }
                }
            }
        });

        // Cookie Helpers
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (encodeURIComponent(value) || "") + expires + "; path=/";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        }

        const inputs = document.querySelectorAll('.calc-input');

        // Load saved values from cookies
        function loadSettings() {
            const savedData = getCookie('mapleCalcData');
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    inputs.forEach(input => {
                        if (parsed[input.id] !== undefined) {
                            if (input.type === 'checkbox') {
                                input.checked = parsed[input.id];
                            } else {
                                input.value = parsed[input.id];
                            }
                        }
                    });
                } catch (e) {
                    console.error("Cookie parsing error", e);
                }
            }
        }

        // Save values to cookies
        function saveSettings() {
            const data = {};
            inputs.forEach(input => {
                if (input.type === 'checkbox') {
                    data[input.id] = input.checked;
                } else {
                    data[input.id] = input.value;
                }
            });
            setCookie('mapleCalcData', JSON.stringify(data), 30); // Save for 30 days
        }

        // Main Calculation Function
        function calculate() {
            // Helper to get number value safely
            const val = (id) => parseFloat(document.getElementById(id).value) || 0;
            const str = (id) => document.getElementById(id).value;
            const isChecked = (id) => document.getElementById(id).checked;

            // 1. 역산: 원본 공격력
            let finalAttack = val('finalAttack');
            let attackPct = val('attackPct');
            let advAttackPct = val('advAttackPct');

            let originalAttack = finalAttack / ((1 + attackPct / 100) * (1 + advAttackPct / 100));

            // Aggregate equipment stats
            let eqStats = {
                attackPct: 0,
                advAttackPct: 0,
                critRate: 0,
                critDmg: 0,
                allDmg: 0,
                normalMonsterDmg: 0,
                bossMonsterDmg: 0,
                aoeDmg: 0,
                projectileDmg: 0,
                allClassDmg: 0,
                basicAttackDmg: 0,
                skillDmg: 0,
                attackDamagePct: 0,
                dmgTakenInc: 0
            };

            const conditionalEnabled = isChecked('equipConditional');
            
            for (const [id, items] of Object.entries(equipmentData)) {
                const select = document.getElementById(id);
                if (select && select.value) {
                    const selectedItem = items[parseInt(select.value)];
                    const mult = val(id + 'Mult') || 0;

                    if (selectedItem && selectedItem.stats) {
                        for (const [stat, value] of Object.entries(selectedItem.stats)) {
                            if (eqStats[stat] !== undefined) eqStats[stat] += value * (1 + mult / 100);
                        }
                    }
                    if (conditionalEnabled && selectedItem && selectedItem.conditional) {
                        for (const [stat, value] of Object.entries(selectedItem.conditional)) {
                            if (eqStats[stat] !== undefined) eqStats[stat] += value * (1 + mult / 100);
                        }
                    }
                }
            }

            // Apply equipment stats
            attackPct += eqStats.attackPct;
            advAttackPct += eqStats.advAttackPct;

            // Recalculate finalAttack with equipment
            finalAttack = originalAttack * (1 + attackPct / 100) * (1 + advAttackPct / 100);

            // Variables based on settings
            const attackType = str('attackType');
            const monsterType = str('monsterType');
            const hitType = str('hitType');
            const myClass = str('myClass');

            // 직업 데미지
            let myClassDmg = 0;
            if(myClass === '전사') myClassDmg = val('warriorDmg');
            if(myClass === '마법사') myClassDmg = val('mageDmg');
            if(myClass === '궁수') myClassDmg = val('archerDmg');
            if(myClass === '도적') myClassDmg = val('thiefDmg');
            if(myClass === '해적') myClassDmg = val('pirateDmg');

            const allClassDmg = val('allClassDmg') + eqStats.allClassDmg;
            
            // 몬스터 데미지
            const monsterDmgBase = monsterType === '일반' ? val('normalMonsterDmg') + eqStats.normalMonsterDmg : val('bossMonsterDmg') + eqStats.bossMonsterDmg;
            const allDmg = val('allDmg') + eqStats.allDmg;
            const skillMultiplier = val('skillMultiplier');
            const attackDamagePct = val('attackDamagePct') + eqStats.attackDamagePct;
            const dmgTakenInc = val('dmgTakenInc') + eqStats.dmgTakenInc;

            // 형태 피해량 (범위/발사체)
            let hitTypeDmgMultiplier = 1;
            if(hitType === '범위') hitTypeDmgMultiplier = 1 + (val('aoeDmg') + eqStats.aoeDmg) / 100;
            if(hitType === '발사체') hitTypeDmgMultiplier = 1 + (val('projectileDmg') + eqStats.projectileDmg) / 100;

            const extraAttackDamageMultiplier = 1 + attackDamagePct / 100;
            const dmgTakenMultiplier = 1 + dmgTakenInc / 100;

            const baseDamageMultiplier = finalAttack
                               * (skillMultiplier / 100) 
                               * (1 + (myClassDmg + allClassDmg) / 100) 
                               * (1 + monsterDmgBase / 100)
                               * (1 + allDmg / 100) 
                               * hitTypeDmgMultiplier 
                               * extraAttackDamageMultiplier 
                               * dmgTakenMultiplier 
                               * 0.99;

            // 공격 타입 (기본공격/스킬) 데미지
            const basicTypeDmg = val('basicAttackDmg') + eqStats.basicAttackDmg;
            const skillTypeDmg = val('skillDmg') + eqStats.skillDmg;

            const basicNoCritDamage = baseDamageMultiplier * (1 + basicTypeDmg / 100);
            const skillNoCritDamage = baseDamageMultiplier * (1 + skillTypeDmg / 100);

            // 크리티컬 확률 & 데미지
            const baseCritRate = val('critRate') + eqStats.critRate;
            const baseCritDmg = val('critDmg') + eqStats.critDmg;

            const basicCritRateAdded = val('basicCritRate');
            const basicCritDmgAdded = val('basicCritDmg');
            const skillCritRateAdded = val('skillCritRate');
            const skillCritDmgAdded = val('skillCritDmg');

            let basicTotalCritRate = baseCritRate + basicCritRateAdded;
            if(basicTotalCritRate > 100) basicTotalCritRate = 100;
            if(basicTotalCritRate < 0) basicTotalCritRate = 0;

            let skillTotalCritRate = baseCritRate + skillCritRateAdded;
            if(skillTotalCritRate > 100) skillTotalCritRate = 100;
            if(skillTotalCritRate < 0) skillTotalCritRate = 0;

            const basicTotalCritDmg = baseCritDmg + basicCritDmgAdded;
            const skillTotalCritDmg = baseCritDmg + skillCritDmgAdded;

            const basicCritDamage = basicNoCritDamage * (1 + basicTotalCritDmg / 100);
            const skillCritDamage = skillNoCritDamage * (1 + skillTotalCritDmg / 100);

            // 평균 데미지
            const basicAvgDamage = (basicNoCritDamage * (1 - basicTotalCritRate/100)) + (basicCritDamage * (basicTotalCritRate/100));
            const skillAvgDamage = (skillNoCritDamage * (1 - skillTotalCritRate/100)) + (skillCritDamage * (skillTotalCritRate/100));

            const avgDamage = attackType === '기본공격' ? basicAvgDamage : skillAvgDamage;
            let displayCritRate = attackType === '기본공격' ? basicTotalCritRate : skillTotalCritRate;

            // 공격속도
            let atkSpeed = val('atkSpeed');
            if(atkSpeed > 12) atkSpeed = 12;
            if(atkSpeed < 0) atkSpeed = 0;
            const atkSpeedBonus = atkSpeed * 20;

            // DPS
            const hitsPerSec = val('hitsPerSec');
            const dpsTime = val('dpsTime');
            const finalHitsPerSec = hitsPerSec * (1 + atkSpeedBonus / 100);
            const avgDPS = avgDamage * finalHitsPerSec;
            const totalDmg = avgDPS * dpsTime;

            // Update UI
            document.getElementById('resOriginalAttack').innerText = originalAttack.toLocaleString(undefined, {maximumFractionDigits: 1});
            document.getElementById('resCritRate').innerText = displayCritRate.toFixed(1) + '%';
            
            document.getElementById('resBasicNoCritDmg').innerText = Math.floor(basicNoCritDamage).toLocaleString();
            document.getElementById('resBasicCritDmg').innerText = Math.floor(basicCritDamage).toLocaleString();
            document.getElementById('resSkillNoCritDmg').innerText = Math.floor(skillNoCritDamage).toLocaleString();
            document.getElementById('resSkillCritDmg').innerText = Math.floor(skillCritDamage).toLocaleString();
            document.getElementById('resAvgDmg').innerText = Math.floor(avgDamage).toLocaleString();

            document.getElementById('resAvgDPS').innerText = Math.floor(avgDPS).toLocaleString();
            document.getElementById('resTotalDmg').innerText = Math.floor(totalDmg).toLocaleString();

            saveSettings();
        }

        // Add event listeners
        inputs.forEach(input => {
            input.addEventListener('input', calculate);
            input.addEventListener('change', calculate);
        });

        // Preset Functions
        function getPresets() {
            const saved = localStorage.getItem('mapleCalcPresets');
            return saved ? JSON.parse(saved) : [];
        }

        function savePresetsToLocal(presets) {
            localStorage.setItem('mapleCalcPresets', JSON.stringify(presets));
        }

        function savePreset() {
            let nameInput = document.getElementById('presetName').value.trim();
            const presets = getPresets();

            if (!nameInput) {
                nameInput = `프리셋 ${presets.length + 1}`;
            }

            const currentData = {};
            document.querySelectorAll('.calc-input').forEach(input => {
                if(input.id && input.id !== 'presetName') {
                    if (input.type === 'checkbox') {
                        currentData[input.id] = input.checked;
                    } else {
                        currentData[input.id] = input.value;
                    }
                }
            });

            // Get the latest calculated DPS by recalculating
            // Note: calculation logic updates resAvgDPS, we grab the raw value calculated inside calculate() implicitly.
            // Better yet, we just trigger calculate to ensure DOM is fresh and parse it.
            calculate();
            const avgDPSStr = document.getElementById('resAvgDPS').innerText.replace(/,/g, '');
            const currentDPS = parseFloat(avgDPSStr) || 0;

            const newPreset = {
                id: Date.now(),
                name: nameInput,
                dps: currentDPS,
                data: currentData
            };

            presets.push(newPreset);
            // Sort by DPS descending
            presets.sort((a, b) => b.dps - a.dps);
            savePresetsToLocal(presets);

            document.getElementById('presetName').value = ''; // clear input
            renderPresets();
        }

        function loadPreset(id) {
            const presets = getPresets();
            const preset = presets.find(p => p.id === id);
            if (preset && preset.data) {
                for (const [key, value] of Object.entries(preset.data)) {
                    const input = document.getElementById(key);
                    if (input) {
                        if (input.type === 'checkbox') {
                            input.checked = value;
                        } else {
                            input.value = value;
                        }
                    }
                }
                calculate();
            }
        }

        function deletePreset(id) {
            let presets = getPresets();
            presets = presets.filter(p => p.id !== id);
            savePresetsToLocal(presets);
            renderPresets();
        }

        function renderPresets() {
            const presets = getPresets();
            const tbody = document.getElementById('presetTableBody');
            tbody.innerHTML = '';

            const filterElement = document.getElementById('presetFilter');
            const filterVal = filterElement ? filterElement.value : '전체';

            const filteredPresets = presets.filter(p => {
                if (filterVal === '전체') return true;
                return p.data && p.data.attackType === filterVal;
            });

            filteredPresets.forEach((preset, index) => {
                const tr = document.createElement('tr');
                tr.className = 'bg-white border-b hover:bg-gray-50';

                tr.innerHTML = `
                    <td class="px-6 py-4 font-bold ${index === 0 ? 'text-yellow-500' : 'text-gray-900'}">${index + 1}</td>
                    <td class="px-6 py-4 font-medium text-gray-900">${preset.name}</td>
                    <td class="px-6 py-4 text-blue-600 font-bold">${Math.floor(preset.dps).toLocaleString()}</td>
                    <td class="px-6 py-4">
                        <button onclick="loadPreset(${preset.id})" class="text-white bg-blue-500 hover:bg-blue-600 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 text-center mr-2 mb-2">불러오기</button>
                        <button onclick="deletePreset(${preset.id})" class="text-white bg-red-500 hover:bg-red-600 focus:ring-4 focus:outline-none focus:ring-red-300 font-medium rounded-lg text-sm px-4 py-2 text-center mb-2">삭제</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Event listener for filter
        document.getElementById('presetFilter')?.addEventListener('change', renderPresets);

        // Initialize
        loadSettings();
        calculate();
        renderPresets();

    </script>
